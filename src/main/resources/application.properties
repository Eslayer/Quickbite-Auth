# Configuración de la Aplicación
spring.application.name=Autenticacion
server.port=8081

# Configuración de Base de Datos
spring.datasource.url=jdbc:mysql://localhost:3306/quickbite_auth?useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=UTC
spring.datasource.username=root
spring.datasource.password=
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# Configuración JPA
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect
spring.jpa.properties.hibernate.format_sql=true

# Configuración JWT
jwt.secret-key=mySecretKeyForQuickBiteAuthenticationService2024
jwt.expiration=86400000
jwt.refresh-token.expiration=604800000

# Configuración de Circuit Breaker
resilience4j.circuitbreaker.instances.authenticationService.failure-rate-threshold=50
resilience4j.circuitbreaker.instances.authenticationService.wait-duration-in-open-state=30s
resilience4j.circuitbreaker.instances.authenticationService.sliding-window-size=10
resilience4j.circuitbreaker.instances.authenticationService.minimum-number-of-calls=5

# Configuración de Rate Limiter
resilience4j.ratelimiter.instances.authenticationService.limit-for-period=10
resilience4j.ratelimiter.instances.authenticationService.limit-refresh-period=1s
resilience4j.ratelimiter.instances.authenticationService.timeout-duration=5s

# Configuración de Retry
resilience4j.retry.instances.authenticationService.max-attempts=3
resilience4j.retry.instances.authenticationService.wait-duration=1s

# Configuración de Logging
logging.level.com.quickbite.Autenticacion=DEBUG
logging.level.org.springframework.security=DEBUG
logging.pattern.console=%d{yyyy-MM-dd HH:mm:ss} - %msg%n

# Endpoints de Gestión
management.endpoints.web.exposure.include=health,info,metrics
management.endpoint.health.show-details=always
